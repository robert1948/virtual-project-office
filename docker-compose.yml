services:
  postgres:
    image: postgres:16
    container_name: vpo-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./.pgdata:/var/lib/postgresql/data
      - ./data/sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-projectoffice} -d ${POSTGRES_DB:-projectoffice}"]
      interval: 5s
      timeout: 3s
      retries: 20
